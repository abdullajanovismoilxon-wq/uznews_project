{% extends "base.html" %}
{% block title %}Kategoriyani o‘chirish{% endblock %}

{% block content %}
<div class="container">
  <h2>Kategoriyani o‘chirish</h2>
  <p>Haqiqatan ham "{{ category.name }}" kategoriyasini o‘chirmoqchimisiz?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">O‘chirish</button>
    <a href="{% url 'dashboard:dashboard_home' %}" class="btn btn-secondary">Bekor qilish</a>
  </form>
</div>
{% endblock %}
